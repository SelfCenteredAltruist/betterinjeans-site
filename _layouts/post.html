---
layout: default
---

<article class="post">

  <!-- Floating left meta column -->
  <aside class="post-meta-column">
    <div class="meta-inner">
      <span class="meta-date">{{ page.date | date: "%B %-d, %Y" }}</span>

      {% if page.tags %}
      <div class="meta-tags">
        {% for tag in page.tags %}
          <a href="{{ '/tag/' | append: tag | append: '.html' | relative_url }}" class="meta-tag">#{{ tag }}</a>
        {% endfor %}
      </div>
      {% endif %}
    </div>
  </aside>

  <header class="post-header">

    <!-- Sigil watermark behind the title -->
    <div class="post-sigil-watermark"></div>

    <!-- Sigil icon above the title -->
    <img src="{{ '/assets/betterinjeans.jpg' | relative_url }}" alt="" class="post-sigil">

    <h1 class="post-title">{{ page.title }}</h1>

  </header>

  <div class="post-content">
    {{ content }}
  </div>

</article>
