---
layout: default
---

<article class="post">

  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <p class="post-date">
      {{ page.date | date: "%B %-d, %Y" }}
    </p>

    {% if page.tags %}
    <p class="post-tags">
      {% for tag in page.tags %}
        <a href="{{ '/tag/' | append: tag | append: '.html' | relative_url }}" class="tag-link">
          #{{ tag }}
        </a>
      {% endfor %}
    </p>
    {% endif %}
  </header>

  <div class="post-content">
    {{ content }}
  </div>

</article>
