---
layout: tag
---

<h1 class="page-title">Posts tagged “{{ page.tag }}”</h1>

<ul class="post-list">
  {% for post in site.posts %}
    {% if post.tags contains page.tag %}
      <li class="post-item">
        <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
        <span class="post-date">{{ post.date | date: "%B %-d, %Y" }}</span>
      </li>
    {% endif %}
  {% endfor %}
</ul>
